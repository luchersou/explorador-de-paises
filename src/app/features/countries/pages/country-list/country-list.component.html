<main class="grain-overlay relative z-10 px-4 py-6 md:px-6 md:py-8 max-w-7xl mx-auto">

  <h1 class="text-4xl md:text-5xl lg:text-6xl mb-6 md:mb-8">
    Countries Explorer
  </h1>

  <app-country-filters
    (searchChange)="onSearch($event)"
    (regionChange)="onRegionChange($event)"
    (sortChange)="onSortChange($event)"
  ></app-country-filters>

  @if (loading()) {
    <app-loading />
  }

  @if (error()) {
    <app-error-message [message]="error()!" />
  }

  @if (!loading() && !error()) {

    <!-- Announces filter results to screen readers without interrupting the user -->
    <p
      class="text-sm text-text-secondary mb-4"
      aria-live="polite"
      aria-atomic="true"
    >
      {{ filteredCountries().length }} countries found
    </p>

    <section aria-label="Countries list">
      <ul class="grid grid-cols-1 gap-4 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 md:gap-6 list-none p-0">
        @for (country of visibleCountries(); track country.cca3) {
          <!-- track by cca3 so Angular reuses DOM nodes instead of recreating them on filter -->
          <li>
            <app-country-card [country]="country" />
          </li>
        }
      </ul>
    </section>

    @if (hasMore()) {
      <div
        class="py-6 flex justify-center"
        role="status"
        aria-label="Loading more countries"
      >
        <div class="w-5 h-5 border-2 border-accent border-t-transparent rounded-full animate-spin"></div>
      </div>
    }

  }

  <!-- Invisible element observed by IntersectionObserver to trigger infinite scroll.
       Kept outside @if so the observer always has a valid DOM reference. -->
  <div #sentinel class="h-10" aria-hidden="true"></div>

</main>
